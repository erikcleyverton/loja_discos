<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANCETERIA- Login</title>
    <link rel="stylesheet" href="../css/style_estruturas_paginas.css">
    <link rel="shortcut icon" href="imagens/icones/login.jpg" type="image/x-icon">
</head>
<body>

    <header class="navbar-container">
        <nav class="navbar">
            <img src="imagens/icones/gravacao-de-vinil-um-classico-atemporal-da-musica.png" alt="Logo" class="logo-img"> 
       
            
            <div class="nav-links">
                <a href="index.html" class="nav-item">HOME</a>
                <a href="#" class="nav-item">CADASTRO</a>
                <a href="#" class="nav-item">SOBRE</a>
            </div>

            <div class="nav-actions">
                <a href="login.html" class="login-link">Login</a>
                <img src="imagens/icones/carrinho.png" alt="Carrinho" class="cart-img">
            </div>
        </nav>
    </header>


    <main class="login-main">
        <div class="login-box">
            <h2>Acesse sua Conta</h2>
            <form id="form-login" action="index.html">
                <input type="email" id="email" placeholder="Digite seu e-mail" required>
                <input type="password" id="password" placeholder="Digite sua senha" required>
                <button type="submit" class="btn-enviar">Entrar</button>
            </form>
        </div>
    </main>

</body>
</html>
