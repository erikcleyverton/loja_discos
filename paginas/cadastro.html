        <section id="pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu produto">
        </section>

        <section id="formulario">
            <form action="#" method="POST"> <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" class="input01" required placeholder="Digite seu nome completo">

                <label for="cpf">CPF</label>
                <input type="text" name="cpf" id="cpf" class="input02" required maxlength="14" placeholder="Digite seu CPF">

                <label for="data-nascimento">Data de Nascimento</label>
                <input type="date" name="data-nascimento" id="data-nascimento" class="input01" required>

                <label for="sexo">Sexo</label>
                <div class="radio-group">
                    <input type="radio" name="sexo" id="sexoM" class="inputOP" value="M"> Masculino
                    <input type="radio" name="sexo" id="sexoF" class="inputOP" value="F"> Feminino
                    <input type="radio" name="sexo" id="sexon" class="inputOP" value="N"> Não Declarar
                </div>

                <label for="cep">CEP</label>
                <input type="text" name="cep" id="cep" class="input02" required maxlength="8" placeholder="Digite Seu CEP">

                <div id="div-dados-endereco">
                    <label for="logradouro">Logradouro</label>
                    <input type="text" name="logradouro" id="logradouro" class="input01">

                    <label for="Bairro">Bairro</label>
                    <input type="text" name="bairro" id="Bairro" class="input01">

                    <label for="num-residencia">Número</label>
                    <input type="text" name="numero" id="num-residencia" class="input01" maxlength="10" placeholder="Digite o número" required>

                    <label for="localidade">Localidade</label>
                    <input type="text" name="localidade" id="localidade" class="input01">

                    <label for="UF">UF</label>
                    <input type="text" name="UF" id="UF" class="input01">
                    
                    <label for="Complemento">Complemento</label>
                    <input type="text" name="Complemento" id="Complemento" class="input01">
                </div>

                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" class="input02" required maxlength="6" placeholder="Informe sua senha">

                <div id="div-btns">
                    <button type="submit" id="btn-add">Cadastrar</button>
                    <button type="reset" id="btn-limpar">Limpar</button>
                </div>
            </form>
        </section> 

        <footer id="rodape">
            <div id="dadosloja">
